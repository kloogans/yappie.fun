    <!-- FAQ structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I need a GPU for yappie?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Use a cloud backend like Groq or OpenAI with just an API key. For local transcription, a GPU helps but CPU-only servers work too."
          }
        },
        {
          "@type": "Question",
          "name": "Is my audio sent to the cloud?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Only if you configure a cloud backend. With a local server, audio never leaves your machine."
          }
        },
        {
          "@type": "Question",
          "name": "Can I share a backend between macOS and Linux?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Both apps use the same OpenAI-compatible API and TCP protocols. Point them at the same server."
          }
        },
        {
          "@type": "Question",
          "name": "Does yappie work on my Linux distro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "If you're running Wayland with PipeWire, yes. Ubuntu, Fedora, Arch, and most modern distros work out of the box. X11 is not currently supported."
          }
        }
      ]
    }
    </script>
